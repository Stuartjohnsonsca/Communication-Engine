name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma format --check || (echo "Prisma schema needs formatting" && exit 1)
      - run: npm run typecheck
      - run: npm run check:tenant-scoping

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acumon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acumon_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acumon_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/acumon_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Apply schema + RLS to test DB
        run: npm run test:setup-db
      - name: Run integration tests
        run: npm test
