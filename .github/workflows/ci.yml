name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # prisma 6+ resolves env() at validate/format time; supply stub URLs so
    # the static checks run without needing a real DB.
    env:
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma format --check || (echo "Prisma schema needs formatting" && exit 1)
      - run: npm run typecheck
      - run: npm run check:tenant-scoping

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acumon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acumon_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acumon_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/acumon_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Apply schema + RLS to test DB
        run: npm run test:setup-db
      - name: Run integration tests
        run: npm test

  evals:
    # AI eval harness — drift detection per PRD §17 mitigation for
    # "judge inconsistency" risk. Non-blocking by design (continue-on-error)
    # so transient model drift doesn't fail CI; the report is logged.
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - name: Run AI evals (mock provider unless API keys are present)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: npm run eval:all
